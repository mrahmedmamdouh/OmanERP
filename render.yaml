services:
  - type: web
    name: oman-erp-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node api/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
